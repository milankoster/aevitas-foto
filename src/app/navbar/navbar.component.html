<nav [ngClass]="transparent ? 'bg-transparent' : 'bg-black bg-opacity-70'"
     class="fixed w-full z-50 top-0 left-0 transition-colors duration-300">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-4 py-3">
    <!-- Logo -->
    <div class="text-2xl font-bold text-white order-1 md:order-none">
      <span class="hidden md:inline">Aevitas Foto</span>
      <span class="md:hidden">AF</span>
    </div>

    <!-- Desktop Links -->
    <ul class="hidden md:flex space-x-8 order-2">
      <li><a routerLink="/" class="text-white hover:text-blue-400">Home</a></li>
      <li><a routerLink="/about" class="text-white hover:text-blue-400">About</a></li>
      <!-- Add more links as needed -->
    </ul>

    <!-- Socials (Desktop only) -->
    <div class="hidden md:flex space-x-4 order-3">
      <a href="https://instagram.com" target="_blank" class="text-white hover:text-pink-400">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="mailto:info@aevitasfoto.com" class="text-white hover:text-blue-400">
        <i class="fas fa-envelope"></i>
      </a>
    </div>

    <!-- Hamburger (Mobile only) -->
    <button class="md:hidden text-white text-2xl order-2" (click)="toggleMobileMenu()">
      <i class="fas" [ngClass]="mobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
    </button>
  </div>
</nav>
