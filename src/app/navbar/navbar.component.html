<nav class="relative w-full">
  <!-- Dimmed background layer -->
  <div
    *ngIf="isDimmed"
    class="absolute inset-0 bg-black opacity-60 z-0"
  ></div>

  <!-- Navbar content -->
  <div class="relative z-10 max-w-7xl mx-auto flex items-center justify-between px-4 py-3">
    <!-- Mobile: Hamburger -->
    <button class="md:hidden text-white text-2xl" (click)="toggleMobileMenu()">
      <i class="fas" [ngClass]="mobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
    </button>

    <!-- Logo -->
    <div class="text-2xl font-bold text-white ml-auto md:ml-0">
      <span class="hidden md:inline">Aevitas Foto</span>
      <span class="md:hidden">AF</span>
    </div>

    <!-- Desktop Links -->
    <ul class="hidden md:flex space-x-8 mx-auto">
      <li><a routerLink="/" class="text-white hover:text-blue-400">Home</a></li>
      <li><a routerLink="/about" class="text-white hover:text-blue-400">About</a></li>
      <li><a routerLink="/contact" class="text-white hover:text-blue-400">Contact</a></li>
      <li><a routerLink="/gallery" class="text-white hover:text-blue-400">Gallery</a></li>
    </ul>

    <!-- Socials -->
    <div class="hidden md:flex space-x-4">
      <a href="https://instagram.com" target="_blank" class="text-white hover:text-pink-400">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="mailto:info@aevitasfoto.com" class="text-white hover:text-blue-400">
        <i class="fas fa-envelope"></i>
      </a>
    </div>
  </div>

  <!-- Mobile menu -->
  <div *ngIf="mobileMenuOpen" class="md:hidden bg-black bg-opacity-70">
    <ul class="flex flex-col items-center py-4 space-y-4 text-white">
      <li><a routerLink="/" (click)="toggleMobileMenu()">Home</a></li>
      <li><a routerLink="/about" (click)="toggleMobileMenu()">About</a></li>
      <li><a routerLink="/contact" (click)="toggleMobileMenu()">Contact</a></li>
      <li><a routerLink="/gallery" (click)="toggleMobileMenu()">Gallery</a></li>
    </ul>
  </div>
</nav>
