<!-- Backdrop -->
<div *ngIf="open"
     class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden"
     (click)="onClose()">
</div>

<!-- Sliding Drawer -->
<div class="fixed top-0 left-0 h-full bg-outer-space text-white-smoke z-50 transform transition-transform duration-300 ease-in-out lg:hidden"
     [ngClass]="{
        '-translate-x-full': !open,
        'translate-x-0': open
      }"
     style="width: min(90vw, 450px)">
  <div class="flex flex-col space-y-6 p-6 mt-16">
    <a routerLink="/" (click)="onClose()">Home</a>
    <a routerLink="/about" (click)="onClose()">About</a>
    <a routerLink="/gallery" (click)="onClose()">Gallery</a>
    <a routerLink="/bookings" (click)="onClose()">Bookings</a>
    <a routerLink="/contact" (click)="onClose()">Contact</a>
  </div>
</div>
