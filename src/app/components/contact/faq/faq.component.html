<section class="w-full bg-isabelline pb-18">
  <div class="max-w-8xl 2xl:max-w-9xl mx-auto px-6 md:px-8 pt-6 md:pt-8 lg:pt-12 flex flex-col">
    <h2 class="text-3xl md:text-4xl 2xl:text-5xl mb-4 text-charcoal font-playfair">
      Frequently Asked Questions
    </h2>

    @for (item of faqKeys; track faqTrackBy; let i = $index) {
      <div class="w-full border-b border-charcoal/20">
        <button
          class="w-full flex items-center justify-between py-5 text-left focus:outline-none focus-visible:ring-2 focus-visible:ring-bronze-dark font-nunito text-charcoal border-0 cursor-pointer"
          type="button"
          [attr.aria-controls]="'faq-answer-' + i"
          [attr.aria-expanded]="isOpen(i)"
          (click)="toggle(i)"
        >
          <span class="text-xl md:text-2xl">
            {{ item.question | transloco }}
          </span>

          <i
            aria-hidden="true"
            class="fas fa-chevron-down text-2xl ml-4 text-bronze transition-transform duration-500"
            [class.-rotate-180]="isOpen(i)"
          ></i>
        </button>

        <!-- Animated container -->
        <div
          class="grid transition-[grid-template-rows,opacity] duration-500 ease-out"
          [attr.aria-hidden]="!isOpen(i)"
          [class.grid-rows-[0fr]]="!isOpen(i)"
          [class.grid-rows-[1fr]]="isOpen(i)"
          [class.opacity-0]="!isOpen(i)"
          [class.opacity-100]="isOpen(i)"
          [id]="'faq-answer-' + i"
        >
          <!-- Inner content -->
          <div class="overflow-hidden">
            <div class="pl-1 md:pl-4 pb-6 text-charcoal text-md 2xl:text-lg font-montserrat font-light">
              @for (paragraphKey of item.answer; track paragraphTrackBy) {
                <div class="faq-answer-paragraph" [innerHTML]="paragraphKey | transloco"></div>
              }
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</section>
