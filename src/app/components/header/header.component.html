<nav class="relative w-full z-50">
  <!-- Dimmed background layer -->
  <div *ngIf="isDimmed" class="hidden lg:block absolute inset-0 bg-black opacity-60 z-0"></div>

  <div class="relative z-50 mx-auto flex items-center justify-between px-4 py-3">
    <!-- Mobile: Hamburger -->
    <button class="hamburger relative w-8 h-8 lg:hidden" (click)="toggleMobileMenu()">
      <span class="bar top" [class.open]="mobileMenuOpen"></span>
      <span class="bar middle" [class.open]="mobileMenuOpen"></span>
      <span class="bar bottom" [class.open]="mobileMenuOpen"></span>
    </button>

    <!-- Logo -->
    <a routerLink="/" class="flex items-center text-red z-50">
      <img src="assets/logo/aevitas-logo.png" alt="Aevitas Foto Logo" class="h-16 w-auto hidden lg:block" />
      <img src="assets/logo/aevitas-logo-mobile.png" alt="Aevitas Foto Logo" class="h-12 w-auto lg:hidden" />
    </a>

    <!-- Desktop Links -->
    <ul class="hidden lg:flex space-x-4 absolute left-1/2 transform -translate-x-1/2">
      <li class="px-2"><a routerLink="/about" class="font-baloo text-xl text-white-smoke custom-underline">About</a></li>
      <li class="px-2"><a routerLink="/gallery" class="font-baloo text-xl text-white-smoke custom-underline">Gallery</a></li>
      <li class="px-2"><a routerLink="/bookings" class="font-baloo text-xl text-white-smoke custom-underline">Bookings</a></li>
      <li class="px-2"><a routerLink="/contact" class="font-baloo text-xl text-white-smoke custom-underline">Contact</a></li>
    </ul>

    <!-- Socials -->
    <div class="hidden lg:flex space-x-4 pr-4">
      <a href="https://www.instagram.com/aevitasfoto" target="_blank" class="text-white-smoke hover:text-pink-400">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="mailto:aevitasfoto@gmail.com" class="text-white-smoke hover:text-blue-400">
        <i class="fas fa-envelope"></i>
      </a>
    </div>
  </div>

  <!-- Mobile Menu Component -->
  <mobile-menu [open]="mobileMenuOpen" (close)="closeMobileMenu()"></mobile-menu>
</nav>
