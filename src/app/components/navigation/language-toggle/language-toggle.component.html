<div class="relative inline-block text-sm text-whitesmoke">
  <button
    aria-haspopup="listbox"
    class="flex items-center space-x-1 px-2 py-1 border border-white/40 rounded hover:bg-white/10 transition focus:outline-none focus:ring-1 focus:ring-white/60"
    data-lang-toggle
    type="button"
    [attr.aria-expanded]="isOpen"
    (click)="toggleOpen()"
  >
    <span class="text-base">
      {{ currentLang === 'sv' ? '🇸🇪' : '🇬🇧' }}
    </span>
    <span class="font-header-links tracking-wide">
      {{ currentLang === 'sv' ? 'SV' : 'EN' }}
    </span>
    <span class="text-xs">
      <i class="fas" [ngClass]="{ 'fa-chevron-up': isOpen, 'fa-chevron-down': !isOpen }"></i>
    </span>
  </button>

  <div
    *ngIf="isOpen"
    class="absolute right-0 mt-1 w-24 bg-outer-space border border-white/40 rounded shadow-lg z-50"
    data-lang-dropdown
    role="listbox"
  >
    <button
      class="w-full flex items-center space-x-1 px-2 py-1 text-left hover:bg-white/10 text-whitesmoke text-sm"
      role="option"
      type="button"
      [attr.aria-selected]="false"
      (click)="selectOther()"
    >
      <span class="text-base">
        {{ currentLang === 'sv' ? '🇬🇧' : '🇸🇪' }}
      </span>
      <span class="font-header-links tracking-wide">
        {{ currentLang === 'sv' ? 'EN' : 'SV' }}
      </span>
    </button>
  </div>
</div>
