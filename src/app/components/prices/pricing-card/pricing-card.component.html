<article class="max-w-8xl 2xl:max-w-9xl mx-auto px-6 md:px-8 py-3">

  <!-- ── Mobile layout (hidden on md+) ─────────────────────────────────────
       Image is rendered as a CSS background; text is overlaid on top.
       This block is hidden from screen readers on desktop via display:none.  -->
  <div
    aria-hidden="false"
    class="pricing-card--mobile md:hidden relative overflow-hidden rounded-lg shadow-md min-h-96"
    [ngStyle]="{ 'background-image': 'url(' + imageSrc() + ')' }"
  >
    <!-- Dark overlay -->
    <div aria-hidden="true" class="absolute inset-0 bg-black/55"></div>

    <!-- Text overlay: title and price on one row, description middle — vertically centred -->
    <div
      class="relative z-10 flex flex-col items-center justify-center min-h-96 px-6 py-8 text-whitesmoke text-center gap-4">
      <div class="w-full">
        <div class="flex items-baseline justify-center gap-4 w-full">
          <h2 class="text-4xl font-nunito font-bold">
            {{ titleKey() | transloco }}
          </h2>
          <p class="text-3xl font-nunito font-bold">
            –
          </p>
          <p class="text-4xl font-nunito font-semibold">
            {{ formattedPrice() }}
          </p>
        </div>
        <p class="mt-4 font-montserrat font-light text-lg max-w-md mx-auto">
          {{ descriptionKey() | transloco }}
        </p>
      </div>

      <!-- Mobile CTA below content -->
      <div class="w-full mt-6 flex justify-center">
        <a class="font-buttons text-sm inline-block" routerLink="/contact">{{ 'prices.cardButton' | transloco }}</a>
      </div>
    </div>
  </div>

  <!-- ── Desktop layout (hidden on mobile) ─────────────────────────────────
       Flex card: image half + text half, reversible.
       Hidden from screen readers on mobile via display:none.              -->
  <div
    aria-hidden="false"
    class="hidden md:flex items-stretch overflow-hidden rounded-xl shadow-md bg-white min-h-80"
    [class.flex-row-reverse]="reversed()"
  >
    <!-- Image half — around 45% width so text area is slightly larger -->
    <div class="pricing-card__img relative w-[45%]">
      <img
        class="absolute inset-0 w-full h-full object-cover"
        fill
        priority
        [alt]="imageAltKey() | transloco"
        [ngSrc]="imageSrc()"
      />
    </div>

    <!-- Text half -->
    <div class="flex w-[55%] min-h-full flex-col px-8 py-8 2xl:px-12 2xl:py-12">
      <div class="flex items-baseline justify-between w-full">
        <h2 class="flex-1 text-3xl 2xl:text-4xl font-nunito font-bold text-charcoal mr-4">
          {{ titleKey() | transloco }}
        </h2>
        <p class="flex-none text-right text-2xl 2xl:text-3xl font-nunito font-semibold text-bronze">
          {{ formattedPrice() }}
        </p>
      </div>
      <p class="mt-4 font-montserrat font-light text-charcoal text-lg 2xl:text-xl text-left md:text-justify" style="text-justify: inter-word;">
        {{ descriptionKey() | transloco }}
      </p>
      <div class="mt-auto">
        <div class="mt-6">
          <a class="font-buttons text-sm" routerLink="/contact">{{ 'prices.cardButton' | transloco }}</a>
        </div>
      </div>
    </div>
  </div>

</article>
