<article class="max-w-8xl 2xl:max-w-9xl mx-auto px-6 md:px-8 py-3">

  <!-- ── Mobile layout (hidden on md+) ─────────────────────────────────────
       Image is rendered as a CSS background; text is overlaid on top.
       This block is hidden from screen readers on desktop via display:none.  -->
  <div
    class="pricing-card--mobile md:hidden relative overflow-hidden rounded-lg shadow-xl min-h-96"
    [style.backgroundImage]="'url(' + imageSrc() + ')'"
    aria-hidden="false"
  >
    <!-- Dark overlay -->
    <div class="absolute inset-0 bg-black/55" aria-hidden="true"></div>

    <!-- Text centred over the image -->
    <div class="relative z-10 flex flex-col items-center justify-center min-h-96 px-6 py-12 text-whitesmoke text-center">
      <h2 class="text-2xl font-nunito font-bold">
        {{ titleKey() | transloco }}
      </h2>
      <p class="text-3xl font-nunito font-bold text-bronze mt-2">
        {{ formattedPrice() }}
      </p>
      <p class="mt-4 font-montserrat font-light text-lg max-w-md">
        {{ descriptionKey() | transloco }}
      </p>
    </div>
  </div>

  <!-- ── Desktop layout (hidden on mobile) ─────────────────────────────────
       Flex card: image half + text half, reversible.
       Hidden from screen readers on mobile via display:none.              -->
  <div
    class="hidden md:flex overflow-hidden rounded-lg shadow-xl bg-timberwolf"
    [class.flex-row-reverse]="reversed()"
    aria-hidden="false"
  >
    <!-- Image half — no padding so it sits flush against the card edge -->
    <div class="pricing-card__img relative w-1/2 min-h-80">
      <img
        class="absolute inset-0 w-full h-full object-cover"
        fill
        [ngSrc]="imageSrc()"
        [alt]="imageAltKey() | transloco"
        priority
      />
    </div>

    <!-- Text half -->
    <div class="w-1/2 flex flex-col justify-center p-8 2xl:p-12">
      <h2 class="text-2xl 2xl:text-3xl font-nunito font-bold text-charcoal">
        {{ titleKey() | transloco }}
      </h2>
      <p class="text-3xl 2xl:text-4xl font-nunito font-bold text-bronze mt-2">
        {{ formattedPrice() }}
      </p>
      <p class="mt-4 font-montserrat font-light text-charcoal text-lg 2xl:text-xl">
        {{ descriptionKey() | transloco }}
      </p>
    </div>
  </div>

</article>
