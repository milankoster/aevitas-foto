<section class="w-full bg-linen py-6 md:py-12 lg:py-16">
  @for (tier of tiers; track tier.titleKey; let i = $index) {
    <div class="py-3">
      <app-pricing-card
        [titleKey]="tier.titleKey"
        [price]="tier.price"
        [currency]="tier.currency"
        [descriptionKey]="tier.descriptionKey"
        [imageSrc]="tier.imageSrc"
        [imageAltKey]="tier.imageAltKey"
        [reversed]="i % 2 !== 0"
      />
    </div>
  }
</section>
