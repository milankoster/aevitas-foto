<section
  class="max-w-8xl mx-auto px-6 md:px-8 pt-6 md:pt-8 lg:pt-12 flex flex-col md:flex-row items-center gap-y-6 md:gap-10"
  id="intro">
  <!-- Text Content -->
  <div class="flex-1 text-left">
    <h2 class="text-3xl md:text-4xl mb-4 text-charcoal font-playfair">
      {{ 'intro.heading' | transloco }}
    </h2>
    <p class="text-md text-charcoal font-montserrat font-light mb-4">
      {{ 'intro.p1' | transloco }}
    </p>
    <p class="text-md text-charcoal font-montserrat font-light mb-4">
      {{ 'intro.p2' | transloco }}
    </p>
    <p class="text-md text-charcoal font-montserrat font-light ">
      {{ 'intro.p3' | transloco }}
    </p>

    <a class="mt-4 font-buttons" role="button" routerLink="/about" tabindex="0">
      {{ 'intro.cta' | transloco }}
    </a>

  </div>

  <!-- Image -->
  <div class="hidden md:flex md:w-1/2 justify-end">
    <img
      alt="{{ 'intro.imageAlt' | transloco }}"
      class="w-full max-w-sm md:max-w-md rounded-xl shadow-xl object-cover"
      height="1350"
      ngSrc="assets/home/caeli-intro.jpg"
      width="1080"
    />
  </div>
</section>
