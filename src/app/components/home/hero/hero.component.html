<div class="relative w-full h-screen overflow-hidden scroll-smooth">
  <!-- Background image -->
  <img alt="Background Hero Image" class="absolute inset-0 w-full h-full object-cover"
       height="3543" ngSrc="assets/home/hero-background.jpg" width="5315"/>

  <!-- Navbar overlay on top of image -->
  <app-header class="absolute top-0 left-0 w-full z-10" [isDimmed]="true"/>

  <!-- Bottom-aligned text content -->
  <div class="relative z-0 flex flex-col items-center justify-end h-full text-center text-white px-4 pb-16">
    <h1 class="text-4xl sm:text-6xl font-logo">Aevitas Foto</h1>
    <p class="mb-2 text-lg md:text-2xl font-subheader">Capturing your precious moments for eternity</p>

    <!-- TODO CTA Button -->
    <!-- TODO fix ref -->
    <a
      class="mt-6 inline-block px-8 py-1 rounded-xl text-white shadow-lg transition text-md duration-300 ease-in-out font-buttons"
      href="#contact"
      onmouseout="this.style.backgroundColor='#9D7245'"
      onmouseover="this.style.backgroundColor='#855E38'"
      style="background-color: #9D7245;"
    >
      Let's chat!
    </a>

    <!-- Chevron at the very bottom, centered -->
    <!-- TODO fix ref -->
    <a
      aria-label="Scroll to about section"
      class="mt-12 text-white text-4xl animate-[bounce_1.5s_ease-in-out_infinite]"
      href="#intro"
    >
      <i class="fas fa-chevron-down"></i>
    </a>
  </div>
</div>
