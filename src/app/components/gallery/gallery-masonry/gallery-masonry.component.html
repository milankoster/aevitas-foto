<section aria-label="Gallery" class="w-full max-w-10xl mx-auto px-6 md:px-8 py-6 md:py-12 lg:py-16">
  <header class="text-center">
    <h1 class="text-3xl md:text-4xl 2xl:text-5xl text-charcoal font-nunito tracking-wide">
      {{ 'gallery.title' | transloco }}
    </h1>

    <app-gallery-tag-filter
      [activeTags]="activeTags()"
      [availableTags]="availableTags()"
      (activeTagsChange)="activeTagsChange.emit($event)"
    />
  </header>

  <div #grid class="mt-8 gallery-grid">
    <div aria-hidden="true" class="gallery-sizer"></div>

    @for (image of images(); track image.id) {
      <div class="gallery-item" [attr.data-groups]="image.tags | json">
        <app-gallery-image
          [image]="image"
          (imageClick)="imageClick.emit($event)"
          (imageLoad)="onImageLoad()"
        />
      </div>
    }
  </div>
</section>
