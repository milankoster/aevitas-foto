<app-header/>

<section class="w-full bg-isabelline pt-12 md:pt-16">
  <div class="max-w-8xl 2xl:max-w-9xl mx-auto px-6 md:px-8">
    <h1 class="text-4xl md:text-5xl 2xl:text-4xl text-charcoal font-playfair">
      {{ 'contact.title' | transloco }}
    </h1>
    <p class="mt-4 text-lg md:text-xl 2xl:text-2xl text-charcoal font-montserrat font-light">
      {{ 'contact.subtitle' | transloco }}
    </p>
  </div>
</section>

<section class="w-full bg-isabelline py-6 md:py-8">
  <div class="max-w-8xl 2xl:max-w-9xl mx-auto px-6 md:px-8">
    <div class="grid grid-cols-1 lg:grid-cols-6 gap-8 lg:gap-12">
      <div class="lg:col-span-4">
        <app-contact-form/>
      </div>

      <div class="lg:col-span-2">
        <app-contact-details/>
      </div>
    </div>
  </div>
</section>

<section class="w-full bg-isabelline pb-12">
  <app-faq/>
</section>


<app-footer/>
