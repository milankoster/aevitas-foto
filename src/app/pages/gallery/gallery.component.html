<div class="page-root">
  <app-header/>
  <app-gallery-masonry
    [activeTags]="activeTags"
    [availableTags]="availableTags"
    [images]="images"
    [multiSelect]="multiSelect"
    (activeTagsChange)="onActiveTagsChange($event)"
    (imageClick)="onImageClick($event)"
  />

  <app-gallery-lightbox
    [activeId]="activeImageId"
    [images]="filteredImages()"
    [open]="lightboxOpen"
    (activeIdChange)="onLightboxActiveIdChange($event)"
    (closed)="closeLightbox()"
  />

  <app-footer/>
</div>
